<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON - Gestão Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --dourado: #d4af37; --preto-profundo: #050505; --cinza-card: #111111; }
        body { background-color: var(--preto-profundo); color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; user-select: none; padding-bottom: env(safe-area-inset-bottom); }
        
        /* TELAS */
        .tela-centrada { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        #tela-login, #tela-registro, #tela-app { display: none; }
        .ativa { display: flex !important; }

        .logo-axon { color: var(--dourado); font-weight: 900; font-size: 2rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 2rem; }
        .card-axon { background: var(--cinza-card); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 12px; padding: 24px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .titulo-lista { color: var(--dourado); font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
        .axon-input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; font-size: 0.85rem; width: 100%; margin-bottom: 12px; }
        .btn-premium { background: var(--dourado); color: #000; font-weight: 900; padding: 14px; border-radius: 8px; width: 100%; text-transform: uppercase; cursor: pointer; border: none; transition: 0.2s; }
        .btn-premium:active { transform: scale(0.98); }
        .link-alternativo { color: var(--dourado); font-size: 0.75rem; margin-top: 1.5rem; cursor: pointer; text-decoration: underline; opacity: 0.8; }

        /* Estilos do Dashboard (Mantendo sua estrutura consolidada) */
        .barra-topo { background-color: #000; height: 70px; border-bottom: 2px solid var(--dourado); display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .menu-abas { display: flex; background: #0a0a0a; border-bottom: 1px solid rgba(212, 175, 55, 0.1); overflow-x: auto; scrollbar-width: none; }
        .item-aba { padding: 15px 20px; color: #555; font-size: 0.7rem; font-weight: bold; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; }
        .item-aba.aba-ativa { color: var(--dourado); border-bottom: 3px solid var(--dourado); }
        .secao-conteudo { display: none; padding: 20px; }
        .secao-conteudo.ativa-dash { display: block; }
    </style>
</head>
<body>

    <main id="tela-login" class="tela-centrada ativa">
        <div class="logo-axon">AXON</div>
        <div class="card-axon">
            <h2 class="titulo-lista"><span>●</span> Acesso Restrito</h2>
            <input type="email" id="login-email" class="axon-input" placeholder="SEU GMAIL:">
            <input type="password" id="login-senha" class="axon-input" placeholder="SUA SENHA:">
            <button onclick="fazerLogin()" class="btn-premium">ENTRAR</button>
            <p id="erro-login" class="text-red-500 text-[10px] mt-4 text-center"></p>
        </div>
        <p class="link-alternativo" onclick="irPara('tela-registro')">NÃO TEM CONTA? REGISTRAR NOVA CONTA</p>
    </main>

    <main id="tela-registro" class="tela-centrada">
        <div class="logo-axon">AXON</div>
        <div class="card-axon">
            <h2 class="titulo-lista"><span>●</span> Nova Conta Premium</h2>
            <input type="email" id="reg-email" class="axon-input" placeholder="CRIAR COM GMAIL:">
            <input type="password" id="reg-senha" class="axon-input" placeholder="CRIAR SENHA:">
            <button onclick="fazerRegistro()" class="btn-premium">CRIAR CONTA AGORA</button>
            <p id="erro-reg" class="text-red-500 text-[10px] mt-4 text-center"></p>
        </div>
        <p class="link-alternativo" onclick="irPara('tela-login')">JÁ TEM CONTA? VOLTAR PARA LOGIN</p>
    </main>

    <div id="tela-app">
        <header class="barra-topo">
            <div class="logo-axon">AXON</div>
            <button onclick="fazerLogout()" class="absolute right-4 text-[10px] text-gray-500 font-bold border border-gray-800 p-1 rounded">SAIR</button>
        </header>
        <nav class="menu-abas">
            <button class="item-aba aba-ativa" onclick="abrirAba('aba-recebimentos', this)">RECEBIMENTOS</button>
            </nav>
        <main class="p-4 md:p-8 max-w-5xl mx-auto">
            <section id="aba-recebimentos" class="secao-conteudo ativa-dash">
                <h2 class="text-dourado">Bem-vindo ao Dashboard AXON</h2>
            </section>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://zqvfnykxwlcozvawqgrn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxdmZueWt4d2xjb3p2YXdxZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NDkzNDQsImV4cCI6MjA4NTMyNTM0NH0.CevpF9vP4748mb2vFNsOp5Kq6u7Nfp_100bJcW7ogUQ'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function irPara(idTela) {
            document.getElementById('tela-login').classList.remove('ativa');
            document.getElementById('tela-registro').classList.remove('ativa');
            document.getElementById('tela-app').style.display = 'none';
            document.getElementById(idTela).classList.add('ativa');
        }

        async function verificarSessao() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('tela-login').classList.remove('ativa');
                document.getElementById('tela-registro').classList.remove('ativa');
                document.getElementById('tela-app').style.display = 'block';
                // carregarDados(); // Sua função original
            }
        }

        async function fazerLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-senha').value.trim();
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('erro-login').innerText = error.message;
            else verificarSessao();
        }

        async function fazerRegistro() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-senha').value.trim();
            if(!email || !password) { document.getElementById('erro-reg').innerText = "Preencha tudo."; return; }
            
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) {
                document.getElementById('erro-reg').innerText = error.message;
            } else {
                alert("Conta criada! Agora faça o login.");
                irPara('tela-login');
            }
        }

        async function fazerLogout() { await _supabase.auth.signOut(); window.location.reload(); }

        verificarSessao();
    </script>
</body>
</html>
