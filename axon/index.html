<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON - Gestão Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AXON">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dourado: #d4af37;
            --preto-profundo: #050505;
            --cinza-card: #111111;
            --cinza-hover: #1a1a1a;
        }

        body {
            background-color: var(--preto-profundo);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .barra-topo {
            background-color: #000;
            height: calc(70px + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--dourado);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-axon {
            color: var(--dourado);
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .menu-abas {
            display: flex;
            justify-content: flex-start;
            background: #0a0a0a;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .menu-abas::-webkit-scrollbar { display: none; }

        .item-aba {
            padding: 15px 20px;
            color: #555;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            background: none;
            border: none;
        }
        .item-aba.ativa { color: var(--dourado); border-bottom: 3px solid var(--dourado); }

        .grid-resumo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .resumo-card { background: #000; border: 1px solid rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 10px; text-align: center; }
        .resumo-label { color: #666; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .resumo-valor { color: var(--dourado); font-weight: 900; font-size: 1.1rem; }

        .card-axon {
            background: var(--cinza-card);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .titulo-lista {
            color: var(--dourado);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center; gap: 12px;
        }

        .item-axon {
            background: rgba(0,0,0,0.4);
            border: 1px solid #222;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .container-input-btn {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .axon-input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 0.85rem;
            flex-grow: 1;
        }

        .btn-enviar-input {
            background: var(--dourado);
            color: #000;
            border: none;
            border-radius: 8px;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enviar-input:active { transform: scale(0.9); }

        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            cursor: pointer; /* Agora é clicável */
            transition: 0.2s;
        }
        .badge:active { transform: scale(0.9); }

        .badge-pendente { background: rgba(212, 175, 55, 0.1); color: var(--dourado); border: 1px solid var(--dourado); }
        .badge-pago { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
        .badge-atrasado { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }

        .btn-lixeira { color: #444; cursor: pointer; font-size: 1.1rem; padding-left: 10px; transition: 0.3s; }
        .btn-lixeira:hover { color: #ef4444; }

        #btn-download-axon {
            position: fixed; bottom: 30px; right: 20px;
            background: var(--dourado); color: #000;
            width: 65px; height: 65px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            z-index: 9999; border: 3px solid #fff; animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-12px);} 60% {transform: translateY(-6px);} }

        .secao-conteudo { display: none; animation: fadeIn 0.4s ease-out; }
        .secao-conteudo.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-axon { background: var(--dourado); color: #000; font-weight: bold; padding: 12px 20px; border-radius: 8px; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; border: none; }
        .dash-cofre { background: linear-gradient(135deg, #000 0%, #1a1a1a 100%); border: 2px solid var(--dourado); padding: 40px 20px; text-align: center; border-radius: 20px; margin-bottom: 30px; }
        .valor-acumulado { font-size: 3.5rem; font-weight: 900; color: var(--dourado); text-shadow: 0 0 25px rgba(212, 175, 55, 0.4); }

        @media (max-width: 768px) { .grid-resumo { grid-template-columns: 1fr; } .valor-acumulado { font-size: 2.2rem; } }
    </style>
</head>
<body>

    <header class="barra-topo"><div class="logo-axon">AXON</div></header>

    <div id="btn-download-axon">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="black" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
    </div>

    <nav class="menu-abas">
        <button class="item-aba ativa" onclick="abrirAba('aba-recebimentos', this)">RECEBIMENTOS</button>
        <button class="item-aba" onclick="abrirAba('aba-pagamentos', this)">PAGAMENTOS</button>
        <button class="item-aba" onclick="abrirAba('aba-tarefas', this)">TAREFAS</button>
        <button class="item-aba" onclick="abrirAba('aba-cofre', this)">COFRE</button>
        <button class="item-aba" onclick="abrirAba('aba-ideias', this)">IDEIAS</button>
    </nav>

    <main class="p-4 md:p-8 max-w-5xl mx-auto">
        
        <section id="aba-recebimentos" class="secao-conteudo ativa">
            <div class="grid-resumo">
                <div class="resumo-card"><div class="resumo-label">A Receber</div><div id="total-receber" class="resumo-valor">R$ 0,00</div></div>
                <div class="resumo-card"><div class="resumo-label">Total Recebido</div><div id="total-receb-pago" class="resumo-valor" style="color: #10b981;">R$ 0,00</div></div>
                <div class="resumo-card"><div class="resumo-label">Em Atraso</div><div id="total-receb-atraso" class="resumo-valor" style="color: #ef4444;">R$ 0,00</div></div>
            </div>
            
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Controle de Status</h2>
                <div id="lista-status" class="mb-6"></div>
                <div class="container-input-btn">
                    <input type="text" id="input-update" class="axon-input" placeholder="Ex: Raphael me pagou 50">
                    <button class="btn-enviar-input" onclick="processarComando('input-update', db_financeiro)">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.001.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="aba-pagamentos" class="secao-conteudo">
            <div class="grid-resumo">
                <div class="resumo-card"><div class="resumo-label">A Pagar</div><div id="total-pagar" class="resumo-valor" style="color: #ef4444;">R$ 0,00</div></div>
                <div class="resumo-card"><div class="resumo-label">Total Pago</div><div id="total-pago-realizado" class="resumo-valor" style="color: #10b981;">R$ 0,00</div></div>
                <div class="resumo-card"><div class="resumo-label">Em Atraso</div><div id="total-pagar-atraso" class="resumo-valor" style="color: #ef4444;">R$ 0,00</div></div>
            </div>
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Controle de Pagamentos</h2>
                <div id="lista-status-pagamentos" class="mb-6"></div>
                <div class="container-input-btn">
                    <input type="text" id="input-update-pag" class="axon-input" placeholder="Ex: Paguei o Aluguel">
                    <button class="btn-enviar-input" onclick="processarComando('input-update-pag', db_pagamentos)">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M15.854.146a.5.5 0 0 1 .11.54L13.026 14.24a.5.5 0 0 1-.941.02l-2.73-6.55-6.55-2.73a.5.5 0 0 1 .02-.941L15.314.036a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 2.76 1.115-11.115L6.636 10.07Z"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="aba-tarefas" class="secao-conteudo">
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Minhas Tarefas</h2>
                <div class="container-input-btn mb-6">
                    <input type="text" id="input-tarefa" class="axon-input" placeholder="Ex: ir para igreja sabado">
                    <button class="btn-enviar-input" onclick="registrarTarefaBotao()">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
                    </button>
                </div>
                <div id="lista-tarefas"></div>
            </div>
        </section>

        <section id="aba-cofre" class="secao-conteudo">
            <div class="dash-cofre">
                <div class="resumo-label">PATRIMÔNIO ACUMULADO</div>
                <div id="valor-cofre-total" class="valor-acumulado">R$ 0,00</div>
            </div>
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> NOVO APORTE</h2>
                <div class="container-input-btn mb-6">
                    <input type="text" id="cofre-valor" class="axon-input" placeholder="Valor (Ex: 100)">
                    <button class="btn-enviar-input" onclick="registrarNoCofre()">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
                    </button>
                </div>
                <div id="lista-cofre" class="space-y-3"></div>
            </div>
        </section>

        <section id="aba-ideias" class="secao-conteudo">
            <div class="card-axon">
                <h2 class="titulo-lista"><span>●</span> Mural de Insights</h2>
                <textarea id="input-ideia" class="axon-input w-full h-32" placeholder="Escreva sua ideia..."></textarea>
                <div class="flex justify-end mt-3">
                    <button onclick="registrarIdeia()" class="btn-axon">SALVAR INSIGHT</button>
                </div>
                <div id="mural-ideias" class="mt-6"></div>
            </div>
        </section>
    </main>

    <script>
        function abrirAba(id, btn) { document.querySelectorAll('.secao-conteudo').forEach(s => s.classList.remove('ativa')); document.querySelectorAll('.item-aba').forEach(b => b.classList.remove('ativa')); document.getElementById(id).classList.add('ativa'); btn.classList.add('ativa'); }

        let db_financeiro = JSON.parse(localStorage.getItem('axon_db')) || [];
        let db_cofre = JSON.parse(localStorage.getItem('axon_cofre')) || [];
        let db_pagamentos = JSON.parse(localStorage.getItem('axon_pagamentos')) || [];
        let db_tarefas = JSON.parse(localStorage.getItem('axon_tarefas')) || [];
        let db_ideias = JSON.parse(localStorage.getItem('axon_ideias')) || [];

        function formatarDataHoje() { const h = new Date(); return `${String(h.getDate()).padStart(2,'0')}/${String(h.getMonth()+1).padStart(2,'0')}/${h.getFullYear()}`; }
        
        function tratarDataAxon(valor) {
            let txt = valor.toLowerCase().trim();
            if (!txt) return formatarDataHoje();
            const hoje = new Date();
            const diasSemana = { 'domingo': 0, 'segunda': 1, 'terça': 2, 'terca': 2, 'quarta': 3, 'quinta': 4, 'sexta': 5, 'sábado': 6, 'sabado': 6 };
            if (diasSemana[txt] !== undefined) {
                let dataResult = new Date();
                let diff = (diasSemana[txt] + 7 - hoje.getDay()) % 7;
                if (diff === 0) diff = 7;
                dataResult.setDate(hoje.getDate() + diff);
                return `${String(dataResult.getDate()).padStart(2, '0')}/${String(dataResult.getMonth() + 1).padStart(2, '0')}/${dataResult.getFullYear()}`;
            }
            let apenasNumeros = txt.replace(/\D/g, "");
            if (apenasNumeros.length === 4) return apenasNumeros.substring(0, 2) + "/" + apenasNumeros.substring(2, 4) + "/" + hoje.getFullYear();
            if (apenasNumeros.length === 8) return apenasNumeros.substring(0, 2) + "/" + apenasNumeros.substring(2, 4) + "/" + apenasNumeros.substring(4, 8);
            return valor || formatarDataHoje();
        }

        function salvarTudo() { 
            localStorage.setItem('axon_db', JSON.stringify(db_financeiro)); 
            localStorage.setItem('axon_cofre', JSON.stringify(db_cofre)); 
            localStorage.setItem('axon_pagamentos', JSON.stringify(db_pagamentos)); 
            localStorage.setItem('axon_tarefas', JSON.stringify(db_tarefas)); 
            localStorage.setItem('axon_ideias', JSON.stringify(db_ideias)); 
            renderizar(); 
        }

        function deletarItem(banco, id) {
            if (!confirm("Excluir permanentemente?")) return;
            if (banco === 'db_financeiro') db_financeiro = db_financeiro.filter(i => i.id !== id);
            if (banco === 'db_pagamentos') db_pagamentos = db_pagamentos.filter(i => i.id !== id);
            if (banco === 'db_cofre') db_cofre = db_cofre.filter(i => i.id !== id);
            if (banco === 'db_tarefas') db_tarefas = db_tarefas.filter(i => i.id !== id);
            if (banco === 'db_ideias') db_ideias = db_ideias.filter(i => i.id !== id);
            salvarTudo();
        }

        // --- CORREÇÃO: FUNÇÃO PARA ALTERAR STATUS AO CLICAR NA BADGE ---
        function alterarStatus(bancoNome, id) {
            let db = (bancoNome === 'db_financeiro') ? db_financeiro : db_pagamentos;
            const alvo = db.find(item => item.id === id);
            if (alvo) {
                alvo.status = (alvo.status === 'pago') ? 'pendente' : 'pago';
                salvarTudo();
            }
        }

        function processarComando(inputId, db) {
            const input = document.getElementById(inputId);
            const comando = input.value.trim();
            if (!comando) return;

            // Regex Consolidada para Dívidas/Pagamentos
            const p1 = comando.match(/(.+?)\s+(?:me\s+)?pagou\s*([\d.]+)?/i);
            const p2 = comando.match(/(?:me\s+)?pagou\s+(?:o\s+|a\s+)?(.+?)\s*([\d.]+)?$/i);
            const p3 = comando.match(/(.+?)\s+(?:paguei|pago)\s*([\d.]+)?/i);
            const p4 = comando.match(/(?:paguei|pago)\s+(?:o\s+|a\s+)?(.+?)\s*([\d.]+)?$/i);
            const p5 = comando.match(/(.+?)\s+(\d+(?:\.\d+)?)\s+(\d{2}\/\d{2}\/\d{4}|\d{4}|\d{8}|segunda|terça|terca|quarta|quinta|sexta|sábado|sabado|domingo)?/i);

            let m = p1 || p2 || p3 || p4;
            if (m) {
                let nome = (m[1] || m[2]).trim();
                const alvo = db.find(r => r.nome.toLowerCase().includes(nome.toLowerCase()) && r.status !== 'pago');
                if (alvo) alvo.status = 'pago';
            } else if (p5) {
                // Registro direto via comando
                db.push({ id: Date.now(), nome: p5[1].trim(), valor: p5[2], data: tratarDataAxon(p5[3] || ""), status: 'pendente' });
            }
            input.value = ''; salvarTudo();
        }

        function registrarTarefaBotao() {
            const el = document.getElementById('input-tarefa');
            if (!el.value) return;
            const regex = /(.+?)\s+(\d{4}|\d{8}|segunda|terça|terca|quarta|quinta|sexta|sábado|sabado|domingo)$/i;
            const match = el.value.match(regex);
            if (match) db_tarefas.push({ id: Date.now(), nome: match[1].trim(), data: tratarDataAxon(match[2]), status: 'pendente' });
            else db_tarefas.push({ id: Date.now(), nome: el.value.trim(), data: formatarDataHoje(), status: 'pendente' });
            el.value = ''; salvarTudo();
        }

        function registrarNoCofre() {
            const v = document.getElementById('cofre-valor').value;
            if(!v) return;
            db_cofre.push({ id: Date.now(), valor: v, data: formatarDataHoje() });
            document.getElementById('cofre-valor').value = ''; salvarTudo();
        }

        function registrarIdeia() {
            const t = document.getElementById('input-ideia').value;
            if(!t) return;
            db_ideias.push({ id: Date.now(), texto: t, data: formatarDataHoje() });
            document.getElementById('input-ideia').value = ''; salvarTudo();
        }

        function renderizar() {
            // Render Recebimentos
            const listStatus = document.getElementById('lista-status');
            listStatus.innerHTML = ''; let sP = 0, sPa = 0, sA = 0;
            db_financeiro.forEach(i => {
                const v = parseFloat(i.valor.replace('.','').replace(',','.')) || 0;
                if (i.status === 'pago') sPa += v; 
                else { sP += v; }
                let sC = i.status === 'pago' ? 'badge-pago' : 'badge-pendente';
                listStatus.innerHTML += `<div class="item-axon"><div>${i.nome}<br><small class="text-gray-500">${i.data}</small></div><div class="flex items-center gap-3"><span class="font-bold text-[var(--dourado)]">R$ ${i.valor}</span><span class="badge ${sC}" onclick="alterarStatus('db_financeiro', ${i.id})">${i.status}</span><div class="btn-lixeira" onclick="deletarItem('db_financeiro', ${i.id})">🗑️</div></div></div>`;
            });
            document.getElementById('total-receber').innerText = `R$ ${sP.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-receb-pago').innerText = `R$ ${sPa.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            // Render Pagamentos
            const listPag = document.getElementById('lista-status-pagamentos');
            listPag.innerHTML = ''; let pP = 0, pPa = 0;
            db_pagamentos.forEach(i => {
                const v = parseFloat(i.valor.replace('.','').replace(',','.')) || 0;
                if (i.status === 'pago') pPa += v; else pP += v;
                let sC = i.status === 'pago' ? 'badge-pago' : 'badge-pendente';
                listPag.innerHTML += `<div class="item-axon"><div>${i.nome}<br><small class="text-gray-500">${i.data}</small></div><div class="flex items-center gap-3"><span class="font-bold text-red-500">R$ ${i.valor}</span><span class="badge ${sC}" onclick="alterarStatus('db_pagamentos', ${i.id})">${i.status}</span><div class="btn-lixeira" onclick="deletarItem('db_pagamentos', ${i.id})">🗑️</div></div></div>`;
            });
            document.getElementById('total-pagar').innerText = `R$ ${pP.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-pago-realizado').innerText = `R$ ${pPa.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            // Render Tarefas
            const listT = document.getElementById('lista-tarefas'); listT.innerHTML = '';
            db_tarefas.forEach(t => {
                listT.innerHTML += `<div class="item-axon"><div>${t.nome}</div><div class="flex items-center gap-3"><small>${t.data}</small><div class="btn-lixeira" onclick="deletarItem('db_tarefas', ${t.id})">🗑️</div></div></div>`;
            });

            // Render Cofre
            const listC = document.getElementById('lista-cofre'); listC.innerHTML = ''; let tC = 0;
            db_cofre.slice().reverse().forEach(c => { tC += parseFloat(c.valor.replace(',','.')); listC.innerHTML += `<div class="item-axon"><div>Depósito<br><small>${c.data}</small></div><div class="flex items-center gap-3"><span class="font-black">R$ ${c.valor}</span><div class="btn-lixeira" onclick="deletarItem('db_cofre', ${c.id})">🗑️</div></div></div>`; });
            document.getElementById('valor-cofre-total').innerText = `R$ ${tC.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            // Render Ideias
            const mural = document.getElementById('mural-ideias'); mural.innerHTML = '';
            db_ideias.slice().reverse().forEach(i => {
                mural.innerHTML += `<div class="balao-ideia"><div class="header-ideia"><span style="font-size:0.6rem; color:#666;">LOG: ${i.data}</span><div class="btn-lixeira" onclick="deletarItem('db_ideias', ${i.id})">🗑️</div></div><div class="corpo-ideia">${i.texto}</div></div>`;
            });
        }
        renderizar();

        // Download Prompt Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
        setTimeout(() => { document.getElementById('btn-download-axon').style.display = 'flex'; }, 5000);
        document.getElementById('btn-download-axon').addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } 
            else { alert("Clique nos 3 pontos do navegador e 'Instalar App' ou 'Adicionar à tela de início'."); }
        });

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
    </script>
</body>
</html>
